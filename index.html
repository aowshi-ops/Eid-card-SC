<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

body {
  margin: 0;
  font-family: 'Tajawal', Arial;
  text-align: center;
  background: #000;
}

.container {
  position: relative;
  width: 100%;
  max-width: 800px;
  margin: auto;
}

img {
  width: 100%;
}

/* خانة الإدخال */
.input-box {
  margin-top: 20px;
}

input {
  padding: 10px;
  font-size: 16px;
  font-family: 'Tajawal';
}

button {
  padding: 10px 15px;
  font-size: 16px;
  cursor: pointer;
  font-family: 'Tajawal';
}

/* الاسم فوق التصميم */
.name {
  position: absolute;
  top: 48%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 20px;
  color: white;
  font-weight: 700;
}
</style>
